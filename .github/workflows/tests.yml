name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  php-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom
          coverage: none

      - name: Show PHP environment
        run: |
          php -v
          php -m

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file" > /dev/null
          done < <(find . -type f -name '*.php' -not -path './.git/*' -print0)

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -r 'json_decode(file_get_contents($argv[1]), true, 512, JSON_THROW_ON_ERROR);' "$file"
          done < <(find . -type f -name '*.json' -not -path './.git/*' -print0)

      - name: Run OpenCalendar tests
        run: php tests/run.php

      - name: Run CalDAV provider tests
        run: php tests/caldav.php

      - name: Run CalDAV HTTP integration tests
        run: bash tests/run-caldav-http.sh
